name: javadoc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: mvn javadoc:javadoc (strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Javadoc
        run: mvn -B -ntp javadoc:javadoc
