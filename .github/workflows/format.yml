name: format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spotless:
    name: mvn spotless:check (google-java-format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check formatting
        run: mvn -B -ntp spotless:check
